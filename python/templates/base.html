<!DOCTYPE html>
<html lang="{{ lang | default('en') }}" data-theme="{{ theme | default('auto') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name | default('Honest App') }}{% endblock %}</title>

    {#
        The component runtime injects CSS custom properties here at startup.
        Every component declares its tokens; the framework merges them
        into a single :root {} block. This link tag is the target.
        Replace with a <style> tag if serving CSS inline.
    #}
    <link rel="stylesheet" href="/static/theme.css">

    {# Application styles go here. Component styles load via their own static routes. #}
    {% block styles %}{% endblock %}
</head>
<body
    hx-ext="domx"
    dx-manifest="appManifest"
    hx-headers='{"X-Request-ID": "{{ request_id | default('') }}"}'
>

    {# ------------------------------------------------------------------ #}
    {# NOTIFICATION SURFACE                                                 #}
    {# honest-alerts delivers messages here via SSE. The sse-connect URL    #}
    {# authenticates via honest-auth session cookie automatically.          #}
    {# Toast and banner surfaces render inside this container.              #}
    {# ------------------------------------------------------------------ #}
    <div id="honest-alerts-banners"
         hx-ext="sse"
         sse-connect="/api/alerts/stream"
         sse-swap="alert:banner"
         hx-swap="afterbegin">
    </div>

    {# ------------------------------------------------------------------ #}
    {# HEADER                                                               #}
    {# ------------------------------------------------------------------ #}
    <header id="honest-header">
        {% block header %}
        <nav>
            <a href="/">{{ app_name | default('Honest App') }}</a>
            {% block nav %}{% endblock %}
        </nav>
        {% endblock %}
    </header>

    {# ------------------------------------------------------------------ #}
    {# TOAST SURFACE                                                        #}
    {# Toasts render here, outside main content flow.                       #}
    {# ------------------------------------------------------------------ #}
    <div id="honest-alerts-toasts"
         hx-ext="sse"
         sse-connect="/api/alerts/stream"
         sse-swap="alert:toast"
         hx-swap="afterbegin"
         aria-live="polite"
         aria-atomic="false">
    </div>

    {# ------------------------------------------------------------------ #}
    {# MAIN CONTENT                                                         #}
    {# ------------------------------------------------------------------ #}
    <main id="honest-main">
        {% block content %}{% endblock %}
    </main>

    {# ------------------------------------------------------------------ #}
    {# FOOTER                                                               #}
    {# ------------------------------------------------------------------ #}
    <footer id="honest-footer">
        {% block footer %}{% endblock %}
    </footer>

    {# ------------------------------------------------------------------ #}
    {# MODAL SURFACE                                                        #}
    {# honest-alerts modal messages render here. The modal blocks           #}
    {# interaction until acknowledged or a reply option is chosen.          #}
    {# ------------------------------------------------------------------ #}
    <div id="honest-alerts-modal"
         hx-ext="sse"
         sse-connect="/api/alerts/stream"
         sse-swap="alert:modal"
         hx-swap="innerHTML"
         role="dialog"
         aria-modal="true">
    </div>

    {# ------------------------------------------------------------------ #}
    {# SCRIPTS                                                              #}
    {# HTMX must load before the SSE extension and the domx extension.     #}
    {# Pin versions in production; unpkg is for development convenience.   #}
    {# ------------------------------------------------------------------ #}
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    {#
        domx: the honest-DOM client library.
        collect(), apply(), observe(), send(), replay().
        The hx-ext="domx" attribute above activates it on the body.
        domx auto-collects state from dx-manifest before every HTMX request.
        Source: https://domx.software
    #}
    <script src="https://unpkg.com/domx@latest/dist/domx.min.js"></script>

    {#
        App manifest: declares what DOM elements constitute user state.
        Every HTMX request will include collect(appManifest) in its body.
        Define this in your app's own JS file or inline here.

        Example:
        const appManifest = {
            search: { selector: '#search-input', read: 'value' },
            filters: { selector: '.filter-tag', read: 'data:value' },
        }
    #}
    {% block manifest %}
    <script>
        const appManifest = {}
    </script>
    {% endblock %}

    {# Page-specific scripts. #}
    {% block scripts %}{% endblock %}
</body>
</html>
