[project]
name = "honest-test"
version = "0.1.0"
description = "The auto-generated verification layer of the Honest Framework: test generation from declarations."
requires-python = ">=3.11"
dependencies = ["honest-type"]

[tool.uv.sources]
honest-type = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/honest_test"]

[tool.honest-check]
conformance = "python"
conformance-suite-version = "0"
