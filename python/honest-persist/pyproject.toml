[project]
name = "honest-persist"
version = "0.1.0"
description = "Persistence layer for the Honest Framework. Guarded mutations, SERIALIZABLE transactions, SQLite for M1."
authors = [{ name = "Adam Zachary Wasserman" }]
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/honest_persist"]

[tool.pytest.ini_options]
testpaths = ["tests"]
